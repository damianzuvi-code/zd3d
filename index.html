<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZD3D – Gestor de Impresión 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1a9fd4;
    --blue-bright: #29c4ff;
    --blue-dark: #0d6ea0;
    --dark-bg: #0a0c10;
    --dark-card: #10141c;
    --dark-card2: #161b26;
    --border: #1e2a3a;
    --border-blue: #1a4a6a;
    --text: #c8d8e8;
    --text-dim: #6a8099;
    --silver: #a0b4c8;
    --white: #e8f0f8;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --glow: 0 0 20px rgba(26,159,212,0.3);
    --glow-strong: 0 0 40px rgba(26,159,212,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--dark-bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(26,159,212,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,159,212,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,16,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-blue);
    padding: 0 24px;
    display: flex; align-items: center; gap: 20px;
    height: 64px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.6);
  }

  .logo-area {
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 26px; font-weight: 700;
    letter-spacing: 2px;
  }
  .logo-text span:first-child { color: var(--white); }
  .logo-text span:last-child { color: var(--blue-bright); }

  .logo-sub {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 1.5px; text-transform: uppercase;
    display: block; margin-top: -4px;
  }

  nav {
    display: flex; gap: 4px; flex: 1; justify-content: center;
  }

  .nav-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Exo 2', sans-serif;
    color: var(--text-dim); font-size: 13px; font-weight: 500;
    padding: 8px 16px; border-radius: 6px;
    display: flex; align-items: center; gap: 7px;
    transition: all .2s; letter-spacing: .5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<p>Placeholder</p>
</body>
</html>
